apiVersion: 1
groups:
  - orgId: 1
    name: Unit-fail-mail
    folder: Logs
    interval: 5m
    rules:
      - uid: ar_logs_unit_fail_mail
        title: Unit-fail-mail errors
        condition: C
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ds_loki_main
            model:
              editorMode: code
              expr: sum(count_over_time({unit=~"unit-fail-mail.+"} |~ "(?i)error" [5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: reducer
            queryType: expression
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: reducer
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: reducer
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations: {}
        labels: {}
        isPaused: false
        notification_settings:
          receiver: grafana-default-email
          repeat_interval: 5m
