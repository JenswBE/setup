apiVersion: 1
groups:
  - orgId: 1
    name: Disk
    folder: Resources
    interval: 5m
    rules:
      - uid: ar_resource_disk_usage
        title: High disk usage
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ds_prometheus_main
            model:
              editorMode: code
              expr: "round((node_filesystem_size_bytes{mountpoint!~\"/run.*\"} - node_filesystem_avail_bytes{mountpoint!~\"/run.*\"}) / node_filesystem_size_bytes{mountpoint!~\"/run.*\"} * 100)"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: reducer
            queryType: expression
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: reducer
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: reducer
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations: {}
        labels: {}
        isPaused: false
        notification_settings:
          receiver: grafana-default-email
          repeat_interval: 24h
