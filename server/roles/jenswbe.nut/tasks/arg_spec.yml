- name: Validate args
  ansible.builtin.validate_argument_spec:
    argument_spec:
      # === REQUIRED ===
      jwnu_nut_type:
        type: str
        required: true
        choices:
          - client_only
          - client_server
        description: Type of NUT install

      # === CONDITIONAL OPTIONAL ===
      jwnu_ups_vendor_id:
        type: str
        required: "{{ jwnu_nut_type == 'client_server' }}"

      jwnu_ups_product_id:
        type: str
        required: "{{ jwnu_nut_type == 'client_server' }}"

      jwnu_ups_serial:
        type: str
        required: "{{ jwnu_nut_type == 'client_server' }}"
